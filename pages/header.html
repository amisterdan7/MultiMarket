<div class="header">
	<section class="logo-icon" onclick="goHome()">
		<img src="../src/assets/icons/logo-icon.svg" alt="Logo da empresa" />
	</section>
	<section>
		<form class="form-container">
			<button type="button" onclick="openProfile()" class="profile-icon">
				<img
					src="../src/assets/icons/profile-icon.svg"
					alt="Perfil do Usuário"
				/>
			</button>
			<button type="button" onclick="openCart()" class="cart-icon">
				<img src="../src/assets/icons/cart-icon.svg" alt="Carrinho de compras" />
			</button>
		</form>
		<form class="search-container" id="search-form" action="#" method="get">
			<input
				type="text"
				id="search-input"
				placeholder="Buscar"
				name="q"
				required
			/>
			<button type="submit"><i class="fas fa-search"></i></button>
		</form>
	</section>
</div>
